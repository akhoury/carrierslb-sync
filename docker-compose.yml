# Local dev compose stack for testing the App outside Home Assistant.
# Boots a Mosquitto broker + the carriers-sync container with /data
# mounted from ./dev/data so you can drop in a real options.json.
#
#   1. Copy dev/options.json.example to dev/data/options.json and edit.
#   2. docker compose up --build
#   3. Watch the carriers-sync logs.
#   4. mosquitto_sub -h localhost -t 'carriers_sync/#' -v
#      to confirm state messages are publishing.
#
# Dev-only filtering (skip accounts you don't currently care about):
#   CARRIERS_SYNC_DEV_PROVIDER=ogero-lb docker compose up
#   CARRIERS_SYNC_DEV_USERNAME=03333333 docker compose up
#   CARRIERS_SYNC_DEV_PROVIDER=alfa-lb,touch-lb docker compose up
# Both env vars are AND-combined; comma-separated lists supported.
# Unset = run all configured accounts (the production behaviour).

name: carriers_sync

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: carriers_sync_dev_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./dev/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  carriers-sync:
    build:
      context: ./carriers_sync
    container_name: carriers_sync_dev_app
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      # Dev-only account filters — pass through whatever is set on the host
      # shell. Empty = no filter (all accounts run, same as production).
      CARRIERS_SYNC_DEV_PROVIDER: "${CARRIERS_SYNC_DEV_PROVIDER:-}"
      CARRIERS_SYNC_DEV_USERNAME: "${CARRIERS_SYNC_DEV_USERNAME:-}"
    volumes:
      - ./dev/data:/data
    restart: unless-stopped
